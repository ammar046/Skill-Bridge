# Render Blueprint — FastAPI backend (Skill Bridge)
# https://render.com/docs/blueprint-spec
#
# After deploy: set secrets in the dashboard (GEMINI_API_KEY, TAVILY_API_KEY, …).
# On Vercel, set VITE_API_BASE_URL to this service URL (no trailing slash).

services:
  - type: web
    name: skill-bridge-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Comma-separated extra origins (production frontend URL, etc.)
      - key: CORS_ORIGINS
        sync: false
      # Optional override; default allows all *.vercel.app preview/prod
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
